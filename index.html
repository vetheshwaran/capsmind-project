<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CapMinds – Appointment Scheduler</title>
  <link rel="icon" type="image/svg+xml href="images/logo.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  
  <header class="topbar">
    <div class="topbar__logo">
      <img src="images/logo.svg" alt="">
      <span class="logo-text">CAPMINDS</span>
    </div>
    <button class="btn-book" id="btnBookAppointment">+ Book Appointment</button>
  </header>

  
  <div class="layout">

    
    <aside class="sidebar" id="sidebar">
      <button class="sidebar__toggle" id="sidebarToggle" aria-label="Toggle sidebar">
        <span class="chevron" id="sidebarChevron">»</span>
      </button>
      <nav class="sidebar__nav">
        <a href="#" class="nav-item active" id="navCalendar" data-view="calendar">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span class="nav-label">Calendar</span>
        </a>
        <a href="#" class="nav-item" id="navDashboard" data-view="dashboard">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          <span class="nav-label">Dashboard</span>
        </a>
      </nav>
    </aside>

   
    <main class="main-content">

     
      <section class="view" id="viewCalendar">
        <div class="calendar-toolbar">
          <button class="cal-nav-btn" id="calPrev">&#8249;</button>
          <div class="cal-month-display">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span id="calMonthLabel"></span>
          </div>
          <button class="cal-nav-btn" id="calNext">&#8250;</button>
          <button class="cal-today-btn" id="calToday">Today</button>
          <div class="cal-view-select-wrapper">
            <select id="calViewSelect" class="cal-view-select">
              <option value="month">Month</option>
              <option value="week">Week</option>
            </select>
          </div>
        </div>

        <div class="calendar-container">
          <div class="doctor-label" id="calDoctorLabel"></div>
          <div class="calendar-grid" id="calendarGrid">
            
          </div>
        </div>
      </section>

      
      <section class="view hidden" id="viewDashboard">
        <h2 class="dash-title">Dashboard</h2>

        <div class="dash-filters">
          <div class="search-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="filterPatient" placeholder="Patient Search" />
          </div>
          <div class="search-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="filterDoctor" placeholder="Doctor Search" />
          </div>
          <div class="date-range">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <input type="date" id="filterDateFrom" />
          </div>
          <span class="dash-dash">—</span>
          <div class="date-range">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <input type="date" id="filterDateTo" />
          </div>
          <button class="btn-update" id="btnUpdate">Update</button>
        </div>

        <div class="dash-table-wrapper">
          <h3 class="table-heading">Appointment Details</h3>
          <table class="dash-table">
            <thead>
              <tr>
                <th>Patient</th>
                <th>Doctor</th>
                <th>Hospital</th>
                <th>Specialty</th>
                <th>Select Date</th>
                <th>Select Time</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="dashTableBody">
              
            </tbody>
          </table>
        </div>
      </section>

    </main>
  </div>

  
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Schedule Appointment</h2>
        <button class="modal-close" id="modalClose" aria-label="Close">&#10005;</button>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          
          <div class="field-group">
            <span class="field-icon">
             <img src="images/user.svg" alt="user icon" width="18" height="18"> 
            </span>
            <div class="field-wrap">
              <select id="fPatient" class="form-select">
                <option value="">Patient Name</option>
                <option>Henry James</option>
                <option>Sarah Connor</option>
                <option>John Doe</option>
                <option>Emily Clarke</option>
              </select>
              <span class="field-error" id="errPatient"></span>
            </div>
          </div>

          
          <div class="field-group">
            <span class="field-icon">
              <img src="images/user.svg" alt="user icon" width="18" height="18">
            </span>
            <div class="field-wrap">
              <select id="fDoctor" class="form-select">
                <option value="">Doctor Name</option>
                <option>James Marry</option>
                <option>Dr. Alan Grant</option>
                <option>Dr. Lisa Cuddy</option>
                <option>Dr. Gregory House</option>
              </select>
              <span class="field-error" id="errDoctor"></span>
            </div>
          </div>

          
          <div class="field-group">
            <span class="field-icon">
              <img src="images/Location.svg" alt="user icon" width="18" height="18">
            </span>
            <div class="field-wrap">
              <select id="fHospital" class="form-select">
                <option value="">Hospital Name</option>
                <option>Salus Center (General Hospital)</option>
                <option>Ultracare (General Hospital)</option>
                <option>City Medical Center</option>
                <option>Sunrise Clinic</option>
              </select>
              <span class="field-error" id="errHospital"></span>
            </div>
          </div>

          
          <div class="field-group">
            <span class="field-icon">
             <img src="images/speciality.svg" alt="user icon" width="18" height="18">
            </span>
            <div class="field-wrap">
              <select id="fSpecialty" class="form-select">
                <option value="">Specialty</option>
                <option>Dermatology</option>
                <option>Cardiology</option>
                <option>Neurology</option>
                <option>Orthopedics</option>
                <option>Pediatrics</option>
              </select>
              <span class="field-error" id="errSpecialty"></span>
            </div>
          </div>

          
          <div class="field-group">
            <span class="field-icon">
              <img src="images/date.svg" alt="user icon" width="18" height="18">
            </span>
            <div class="field-wrap">
              <input type="date" id="fDate" class="form-input" placeholder="Select Date" />
              <span class="field-error" id="errDate"></span>
            </div>
          </div>

         
          <div class="field-group">
            <span class="field-icon">
             <img src="images/time.svg" alt="user icon" width="18" height="18">
            </span>
            <div class="field-wrap">
              <input type="time" id="fTime" class="form-input" placeholder="Select Time" />
              <span class="field-error" id="errTime"></span>
            </div>
          </div>
        </div>

       
        <div class="field-group field-group--full">
          <label class="reason-label" for="fReason">Reason</label>
          <textarea id="fReason" class="form-textarea" rows="3" placeholder="Enter reason for appointment"></textarea>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn-cancel" id="btnCancel">Cancel</button>
        <button class="btn-save" id="btnSave">Save</button>
      </div>
    </div>
  </div>

  
  <div class="toast hidden" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
